version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: cron
      cronjob: "0 10 1,15 * *"
      timezone: Asia/Yekaterinburg
    target-branch: master
    open-pull-requests-limit: 4
    labels:
      - dependencies
    groups:
      npm:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: "0 10 1,15 * *"
      timezone: Asia/Yekaterinburg
    target-branch: master
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - '*'
